name = "staffnow-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:3002,http://localhost:3000,http://127.0.0.1:3002"
API_URL = "http://localhost:8787"

[[d1_databases]]
binding = "DB"
database_name = "staffnow-db"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "staffnow-uploads"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[env.staging]
vars = { ENVIRONMENT = "staging", CORS_ORIGIN = "https://staging.staffnow.gr", API_URL = "https://api-staging.staffnow.gr" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "staffnow-db-staging"
database_id = "YOUR_STAGING_D1_DATABASE_ID"

[[env.staging.r2_buckets]]
binding = "R2"
bucket_name = "staffnow-uploads-staging"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "YOUR_STAGING_KV_NAMESPACE_ID"

[env.production]
vars = { ENVIRONMENT = "production", CORS_ORIGIN = "https://staffnow.gr", API_URL = "https://api.staffnow.gr" }
routes = [{ pattern = "api.staffnow.gr", custom_domain = true }]

[[env.production.d1_databases]]
binding = "DB"
database_name = "staffnow-db-prod"
database_id = "YOUR_PROD_D1_DATABASE_ID"

[[env.production.r2_buckets]]
binding = "R2"
bucket_name = "staffnow-uploads-prod"

[[env.production.kv_namespaces]]
binding = "KV"
id = "YOUR_PROD_KV_NAMESPACE_ID"
